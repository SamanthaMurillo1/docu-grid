services:
  app:
    build: .
    image: docu-signup-app:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - GOOGLE_APPLICATION_CREDENTIALS=/config/serviceAccountKey.json
      - FIREBASE_PROJECT_ID=docu-signup
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL:-https://docu-signup-default-rtdb.firebaseio.com}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-docu-signup.appspot.com}
    volumes:
      - ./config/serviceAccountKey.json:/config/serviceAccountKey.json:ro
    restart: unless-stopped
